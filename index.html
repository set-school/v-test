<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Интерактивный тест на знание второй формы 100 английских глаголов">
  <title>VerbSprint — тест на вторую форму глаголов</title>
  <style>
    :root {
      --ink: #182019;
      --muted: #687068;
      --paper: #fffdf7;
      --line: #dcded6;
      --green: #174d3b;
      --lime: #dff56c;
      --coral: #ff7b61;
      --wrong: #b43b35;
      --right: #19734f;
      --shadow: 0 20px 55px rgba(23, 77, 59, .12);
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      color: var(--ink);
      background:
        radial-gradient(circle at 8% 2%, rgba(223,245,108,.55), transparent 24rem),
        radial-gradient(circle at 92% 16%, rgba(255,123,97,.18), transparent 22rem),
        #f2f3eb;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    button, input { font: inherit; }
    .shell { width: min(1080px, calc(100% - 32px)); margin: 0 auto; }

    header { padding: 54px 0 30px; }
    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin: 0 0 15px;
      padding: 7px 11px;
      border: 1px solid rgba(23,77,59,.18);
      border-radius: 999px;
      background: rgba(255,255,255,.55);
      color: var(--green);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .12em;
      text-transform: uppercase;
    }
    .eyebrow::before { content: ""; width: 8px; height: 8px; border-radius: 50%; background: var(--coral); }
    h1 {
      max-width: 820px;
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(44px, 8vw, 92px);
      font-weight: 500;
      letter-spacing: -.055em;
      line-height: .92;
    }
    h1 em { color: var(--green); font-style: italic; }
    .intro {
      display: flex;
      justify-content: space-between;
      gap: 28px;
      align-items: end;
      margin-top: 28px;
      padding-top: 22px;
      border-top: 1px solid rgba(24,32,25,.22);
    }
    .intro p { max-width: 640px; margin: 0; color: var(--muted); font-size: 17px; line-height: 1.6; }
    .score-pill { flex: none; color: var(--green); font-weight: 850; font-size: 14px; }

    .progress-wrap {
      position: sticky;
      z-index: 10;
      top: 12px;
      display: flex;
      align-items: center;
      gap: 14px;
      margin: 0 0 20px;
      padding: 12px 15px;
      border: 1px solid rgba(23,77,59,.13);
      border-radius: 14px;
      background: rgba(255,253,247,.9);
      box-shadow: 0 8px 26px rgba(24,32,25,.07);
      backdrop-filter: blur(12px);
    }
    .progress-track { height: 7px; flex: 1; overflow: hidden; border-radius: 999px; background: #e5e6de; }
    .progress-bar { width: 0; height: 100%; border-radius: inherit; background: var(--green); transition: width .25s ease; }
    .progress-label { min-width: 98px; color: var(--green); font-size: 13px; font-weight: 800; text-align: right; }

    .quiz-card {
      overflow: hidden;
      border: 1px solid rgba(24,32,25,.14);
      border-radius: 24px;
      background: var(--paper);
      box-shadow: var(--shadow);
    }
    .question {
      display: grid;
      grid-template-columns: 205px 1fr;
      gap: 30px;
      padding: 24px 28px;
      border-bottom: 1px solid var(--line);
      transition: background .2s ease;
    }
    .question:last-child { border-bottom: 0; }
    .question.unanswered { background: #fff1e9; }
    .question.correct { background: #edf8ef; }
    .question.incorrect { background: #fff0ed; }
    .prompt { display: flex; align-items: baseline; gap: 12px; }
    .number { width: 28px; color: #9a9e96; font-size: 12px; font-weight: 800; letter-spacing: .08em; }
    .verb { font-family: Georgia, "Times New Roman", serif; font-size: 26px; font-weight: 600; }
    .options { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 10px; }
    .option { position: relative; min-width: 0; }
    .option input { position: absolute; opacity: 0; pointer-events: none; }
    .option span {
      display: flex;
      min-height: 48px;
      align-items: center;
      justify-content: center;
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 11px;
      background: #fff;
      font-weight: 750;
      text-align: center;
      cursor: pointer;
      transition: transform .15s ease, border-color .15s ease, background .15s ease;
    }
    .option span:hover { transform: translateY(-2px); border-color: var(--green); }
    .option input:focus-visible + span { outline: 3px solid rgba(255,123,97,.38); outline-offset: 2px; }
    .option input:checked + span { border-color: var(--green); background: var(--lime); color: #102c23; }
    .option input:disabled + span { cursor: default; transform: none; }
    .option.answer-right span { border-color: var(--right); background: #ccebd9; color: #11573b; }
    .option.answer-wrong span { border-color: var(--wrong); background: #ffd7d1; color: #812821; text-decoration: line-through; }

    .actions { display: flex; justify-content: center; padding: 34px 0 70px; }
    .primary {
      border: 0;
      border-radius: 999px;
      padding: 17px 28px;
      background: var(--green);
      color: #fff;
      font-weight: 850;
      box-shadow: 0 12px 28px rgba(23,77,59,.22);
      cursor: pointer;
      transition: transform .16s ease, box-shadow .16s ease;
    }
    .primary:hover { transform: translateY(-2px); box-shadow: 0 16px 34px rgba(23,77,59,.28); }

    .result {
      display: none;
      margin: 0 0 70px;
      padding: clamp(28px, 5vw, 54px);
      border-radius: 26px;
      background: var(--green);
      color: #fff;
      box-shadow: var(--shadow);
    }
    .result.show { display: block; animation: rise .45s ease both; }
    @keyframes rise { from { opacity: 0; transform: translateY(16px); } }
    .result-grid { display: grid; grid-template-columns: auto 1fr; gap: clamp(28px, 6vw, 70px); align-items: center; }
    .big-score { font-family: Georgia, "Times New Roman", serif; font-size: clamp(72px, 14vw, 145px); line-height: .8; letter-spacing: -.06em; }
    .big-score small { font-family: Inter, sans-serif; font-size: 18px; letter-spacing: 0; opacity: .68; }
    .result h2 { margin: 0 0 10px; font-family: Georgia, "Times New Roman", serif; font-size: clamp(30px, 5vw, 50px); font-weight: 500; }
    .result p { margin: 0 0 22px; color: rgba(255,255,255,.72); font-size: 17px; line-height: 1.55; }
    .secondary { border: 1px solid rgba(255,255,255,.42); border-radius: 999px; padding: 12px 18px; background: transparent; color: #fff; font-weight: 800; cursor: pointer; }
    .mistakes { margin-top: 28px; padding-top: 24px; border-top: 1px solid rgba(255,255,255,.18); }
    .mistakes h3 { margin: 0 0 12px; font-size: 14px; letter-spacing: .1em; text-transform: uppercase; }
    .mistake-list { display: flex; flex-wrap: wrap; gap: 8px; }
    .mistake-list span { padding: 7px 10px; border-radius: 8px; background: rgba(255,255,255,.1); font-size: 14px; }

    footer { padding: 0 0 36px; color: #777d75; font-size: 13px; text-align: center; }
    @media (max-width: 700px) {
      header { padding-top: 35px; }
      .intro { display: block; }
      .score-pill { margin-top: 14px; }
      .question { grid-template-columns: 1fr; gap: 14px; padding: 20px 16px; }
      .options { gap: 6px; }
      .option span { min-height: 44px; padding: 7px 4px; font-size: 13px; }
      .result-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header class="shell">
    <p class="eyebrow">100 most common verbs</p>
    <h1>Знаешь вторую <em>форму?</em></h1>
    <div class="intro">
      <p>Выбери форму Past Simple для каждого глагола. В каждом вопросе только один правильный ответ, и за него ты получишь 1 балл.</p>
      <span class="score-pill">Максимум — 100 баллов</span>
    </div>
  </header>

  <main class="shell">
    <div class="progress-wrap" aria-live="polite">
      <div class="progress-track"><div class="progress-bar" id="progressBar"></div></div>
      <span class="progress-label" id="progressLabel">0 из 100</span>
    </div>

    <form id="quizForm" novalidate>
      <section class="quiz-card" id="quiz" aria-label="Вопросы теста"></section>
      <div class="actions"><button class="primary" type="submit">Узнать результат →</button></div>
    </form>

    <section class="result" id="result" aria-live="polite">
      <div class="result-grid">
        <div class="big-score"><span id="score">0</span><small>/100</small></div>
        <div>
          <h2 id="resultTitle">Результат готов</h2>
          <p id="resultText"></p>
          <button class="secondary" id="restart" type="button">Пройти ещё раз</button>
        </div>
      </div>
      <div class="mistakes" id="mistakes"></div>
    </section>
  </main>

  <footer class="shell">VerbSprint · тренажёр неправильных и правильных глаголов</footer>

  <script>
    const verbs = [
      ["be", "was / were"], ["have", "had"], ["do", "did"], ["say", "said"], ["go", "went"],
      ["drive", "drove"], ["get", "got"], ["make", "made"], ["know", "knew"], ["think", "thought"],
      ["take", "took"], ["see", "saw"], ["come", "came"], ["want", "wanted"], ["look", "looked"],
      ["use", "used"], ["find", "found"], ["give", "gave"], ["tell", "told"], ["work", "worked"],
      ["call", "called"], ["try", "tried"], ["ask", "asked"], ["need", "needed"], ["feel", "felt"],
      ["become", "became"], ["leave", "left"], ["put", "put"], ["mean", "meant"], ["keep", "kept"],
      ["let", "let"], ["begin", "began"], ["seem", "seemed"], ["help", "helped"], ["talk", "talked"],
      ["turn", "turned"], ["start", "started"], ["show", "showed"], ["hear", "heard"], ["play", "played"],
      ["run", "ran"], ["move", "moved"], ["like", "liked"], ["live", "lived"], ["believe", "believed"],
      ["hold", "held"], ["bring", "brought"], ["happen", "happened"], ["write", "wrote"], ["provide", "provided"],
      ["sit", "sat"], ["stand", "stood"], ["lose", "lost"], ["pay", "paid"], ["meet", "met"],
      ["include", "included"], ["continue", "continued"], ["set", "set"], ["learn", "learned / learnt"], ["change", "changed"],
      ["lead", "led"], ["understand", "understood"], ["watch", "watched"], ["follow", "followed"], ["stop", "stopped"],
      ["create", "created"], ["speak", "spoke"], ["read", "read /red/"], ["allow", "allowed"], ["add", "added"],
      ["spend", "spent"], ["grow", "grew"], ["open", "opened"], ["walk", "walked"], ["win", "won"],
      ["offer", "offered"], ["remember", "remembered"], ["love", "loved"], ["consider", "considered"], ["appear", "appeared"],
      ["buy", "bought"], ["wait", "waited"], ["serve", "served"], ["die", "died"], ["send", "sent"],
      ["expect", "expected"], ["build", "built"], ["stay", "stayed"], ["fall", "fell"], ["cut", "cut"],
      ["reach", "reached"], ["kill", "killed"], ["remain", "remained"], ["suggest", "suggested"], ["raise", "raised"],
      ["pass", "passed"], ["sell", "sold"], ["require", "required"], ["report", "reported"], ["decide", "decided"]
    ];

    const quiz = document.querySelector("#quiz");
    const form = document.querySelector("#quizForm");
    const result = document.querySelector("#result");
    const progressBar = document.querySelector("#progressBar");
    const progressLabel = document.querySelector("#progressLabel");

    function seededShuffle(items, seed) {
      const copy = [...items];
      let state = seed + 1;
      for (let i = copy.length - 1; i > 0; i--) {
        state = (state * 9301 + 49297) % 233280;
        const j = Math.floor((state / 233280) * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function choicesFor(index) {
      const correct = verbs[index][1];
      const distractors = verbs
        .map(item => item[1])
        .filter((answer, position, all) => answer !== correct && all.indexOf(answer) === position);
      const mixed = seededShuffle(distractors, index * 19 + 7).slice(0, 2);
      return seededShuffle([correct, ...mixed], index * 31 + 11);
    }

    function renderQuiz() {
      quiz.innerHTML = verbs.map(([verb], index) => {
        const options = choicesFor(index).map(answer => `
          <label class="option">
            <input type="radio" name="q${index}" value="${answer}">
            <span>${answer}</span>
          </label>`).join("");
        return `
          <div class="question" data-index="${index}">
            <div class="prompt"><span class="number">${String(index + 1).padStart(2, "0")}</span><span class="verb">${verb}</span></div>
            <div class="options">${options}</div>
          </div>`;
      }).join("");
    }

    function updateProgress() {
      const answered = new FormData(form);
      let count = 0;
      for (const key of answered.keys()) if (key.startsWith("q")) count++;
      progressBar.style.width = `${count}%`;
      progressLabel.textContent = `${count} из 100`;
    }

    quiz.addEventListener("change", event => {
      event.target.closest(".question")?.classList.remove("unanswered");
      updateProgress();
    });

    form.addEventListener("submit", event => {
      event.preventDefault();
      const data = new FormData(form);
      const missing = verbs.map((_, i) => i).filter(i => !data.has(`q${i}`));
      document.querySelectorAll(".question").forEach(el => el.classList.remove("unanswered"));

      if (missing.length) {
        missing.forEach(i => document.querySelector(`[data-index="${i}"]`).classList.add("unanswered"));
        const first = document.querySelector(`[data-index="${missing[0]}"]`);
        first.scrollIntoView({ behavior: "smooth", block: "center" });
        progressLabel.textContent = `Осталось: ${missing.length}`;
        return;
      }

      let score = 0;
      const wrong = [];
      verbs.forEach(([verb, correct], index) => {
        const question = document.querySelector(`[data-index="${index}"]`);
        const selected = data.get(`q${index}`);
        const isCorrect = selected === correct;
        if (isCorrect) score++;
        else wrong.push(`${verb} → ${correct}`);
        question.classList.add(isCorrect ? "correct" : "incorrect");
        question.querySelectorAll("input").forEach(input => {
          input.disabled = true;
          const label = input.closest(".option");
          if (input.value === correct) label.classList.add("answer-right");
          else if (input.checked) label.classList.add("answer-wrong");
        });
      });

      const percent = score;
      let title = "Продолжай тренировку";
      let text = "Ошибки — это карта того, что стоит повторить. Следующая попытка точно будет сильнее.";
      if (percent === 100) { title = "Безупречно!"; text = "Все 100 ответов правильные. Похоже, Past Simple у тебя уже в мышечной памяти."; }
      else if (percent >= 85) { title = "Отличный результат"; text = "Ты уверенно знаешь вторую форму самых частых английских глаголов."; }
      else if (percent >= 65) { title = "Хорошая база"; text = "Большая часть уже на месте. Повтори ошибки ниже — и результат быстро вырастет."; }
      else if (percent >= 40) { title = "Неплохое начало"; text = "Знакомые формы уже узнаются. Ещё пара подходов поможет закрепить сложные глаголы."; }

      document.querySelector("#score").textContent = score;
      document.querySelector("#resultTitle").textContent = title;
      document.querySelector("#resultText").textContent = `${text} Правильных ответов: ${score} из 100.`;
      document.querySelector("#mistakes").innerHTML = wrong.length
        ? `<h3>Повторить (${wrong.length})</h3><div class="mistake-list">${wrong.map(item => `<span>${item}</span>`).join("")}</div>`
        : `<h3>Ошибок нет — идеальная работа</h3>`;
      result.classList.add("show");
      result.scrollIntoView({ behavior: "smooth", block: "start" });
    });

    document.querySelector("#restart").addEventListener("click", () => {
      form.reset();
      document.querySelectorAll(".question").forEach(question => {
        question.classList.remove("correct", "incorrect", "unanswered");
        question.querySelectorAll("input").forEach(input => { input.disabled = false; });
        question.querySelectorAll(".option").forEach(option => option.classList.remove("answer-right", "answer-wrong"));
      });
      result.classList.remove("show");
      updateProgress();
      window.scrollTo({ top: 0, behavior: "smooth" });
    });

    renderQuiz();
  </script>
</body>
</html>
